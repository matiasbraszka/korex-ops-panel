<!DOCTYPE html>
<html>
<head>
<base target="_top">
<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 16px; color: #1f2937; font-size: 13px; }
  h2 { font-size: 15px; margin: 0 0 12px; }
  label { display: block; font-weight: 600; margin: 10px 0 4px; font-size: 12px; color: #374151; }
  select, input { width: 100%; box-sizing: border-box; padding: 7px 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; }
  .preview { margin-top: 14px; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; background: #f9fafb; }
  .row { display: flex; justify-content: space-between; padding: 3px 0; }
  .row span:first-child { color: #6b7280; }
  .row span:last-child { font-weight: 600; text-align: right; }
  .num { font-size: 20px; font-weight: 700; color: #2563eb; }
  .err { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }
  .ok-msg { background: #f0fdf4; border-color: #bbf7d0; color: #166534; padding: 12px; border-radius: 8px; margin-top: 12px; }
  .actions { margin-top: 16px; display: flex; gap: 8px; justify-content: flex-end; }
  button { padding: 8px 16px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
  .send { background: #2563eb; color: #fff; }
  .send:disabled { background: #9ca3af; cursor: not-allowed; }
  .cancel { background: #f3f4f6; color: #374151; }
  .muted { color: #9ca3af; font-size: 11px; }
  .spin { color: #6b7280; }
</style>
</head>
<body>
  <h2>Enviar factura</h2>
  <div id="loading" class="spin">Cargando ventas pendientes…</div>

  <div id="form" style="display:none">
    <label>Cliente</label>
    <select id="cliente" onchange="onCliente()"></select>

    <label>Venta a facturar</label>
    <select id="venta" onchange="onVenta()"></select>

    <div id="preview"></div>

    <div class="actions">
      <button class="cancel" onclick="google.script.host.close()">Cancelar</button>
      <button class="send" id="btnSend" onclick="enviar()" disabled>Enviar factura</button>
    </div>
    <div class="muted" style="margin-top:8px">La factura se guarda en la carpeta del mes en Drive y se envía por email al cliente.</div>
  </div>

<script>
  var PEND = [];        // todas las ventas pendientes
  var CURRENT = null;   // preview actual

  function money(n, cur) {
    var v = Math.trunc(Number(n)||0).toLocaleString('es-AR'); // sin decimales
    return (cur || '') + ' ' + v;
  }

  google.script.run.withSuccessHandler(function(rows){
    PEND = rows || [];
    document.getElementById('loading').style.display = 'none';
    if (!PEND.length) { document.getElementById('loading').style.display='block'; document.getElementById('loading').textContent = 'No hay ventas pendientes de facturar.'; return; }
    document.getElementById('form').style.display = 'block';
    // clientes únicos
    var clientes = [];
    PEND.forEach(function(p){ if (clientes.indexOf(p.usuario) === -1) clientes.push(p.usuario); });
    clientes.sort();
    var sel = document.getElementById('cliente');
    sel.innerHTML = '<option value="">— elegí un cliente —</option>' +
      clientes.map(function(c){ return '<option>'+esc(c)+'</option>'; }).join('');
  }).withFailureHandler(showErr).facListarPendientes();

  function onCliente() {
    var c = document.getElementById('cliente').value;
    var vsel = document.getElementById('venta');
    document.getElementById('preview').innerHTML = '';
    setSend(false);
    if (!c) { vsel.innerHTML = ''; return; }
    var ventas = PEND.filter(function(p){ return p.usuario === c; });
    vsel.innerHTML = '<option value="">— elegí la venta —</option>' + ventas.map(function(p){
      var label = (p.fecha||'') + ' · ' + (p.producto||p.tipo||'venta') + ' · ' + money(p.montoUsd||p.montoEur, 'US$');
      return '<option value="'+p.row+'">'+esc(label)+'</option>';
    }).join('');
  }

  function onVenta() {
    var row = document.getElementById('venta').value;
    document.getElementById('preview').innerHTML = '';
    setSend(false);
    CURRENT = null;
    if (!row) return;
    document.getElementById('preview').innerHTML = '<div class="spin">Calculando número y validando datos…</div>';
    google.script.run.withSuccessHandler(renderPreview).withFailureHandler(showErr).facPreview(Number(row));
  }

  function renderPreview(res) {
    if (!res || !res.ok) { document.getElementById('preview').innerHTML = '<div class="preview err">'+esc(res && res.error || 'Error')+'</div>'; return; }
    CURRENT = res.data;
    var d = res.data;
    var html = '<div class="preview">';
    if (res.faltan && res.faltan.length) {
      html += '<div class="err" style="padding:8px;border-radius:6px;margin-bottom:8px">⚠️ Faltan datos del cliente en Base de datos: <b>'+esc(res.faltan.join(', '))+'</b>. No se puede enviar hasta completarlos.</div>';
    }
    html += '<div class="row"><span>Número de factura</span><span class="num">'+esc(d.numeroFmt)+'</span></div>';
    html += '<div class="row"><span>Carpeta / mes</span><span>'+esc(d.mesCarpeta)+'</span></div>';
    html += '<div class="row"><span>Fecha</span><span>'+esc(d.fechaStr)+'</span></div>';
    html += '<hr style="border:none;border-top:1px solid #e5e7eb;margin:8px 0">';
    html += '<div class="row"><span>Facturado a</span><span>'+esc(d.nombreFactura||'—')+'</span></div>';
    html += '<div class="row"><span>ID fiscal o DNI</span><span>'+esc(d.idFiscal||'—')+'</span></div>';
    html += '<div class="row"><span>Dirección</span><span>'+esc(d.direccion||'—')+'</span></div>';
    html += '<div class="row"><span>Email</span><span>'+esc(d.email||'—')+'</span></div>';
    html += '<hr style="border:none;border-top:1px solid #e5e7eb;margin:8px 0">';
    html += '<div class="row"><span>Concepto</span><span>'+esc(d.concepto)+'</span></div>';
    html += '<div class="row"><span>Importe</span><span>'+esc(money(d.monto, d.moneda))+'</span></div>';
    html += '<div class="row"><span>Forma de pago</span><span>'+esc(d.formaPago||'—')+'</span></div>';
    html += '</div>';
    document.getElementById('preview').innerHTML = html;
    setSend(!(res.faltan && res.faltan.length));
  }

  function enviar() {
    if (!CURRENT) return;
    setSend(false);
    document.getElementById('btnSend').textContent = 'Enviando…';
    google.script.run.withSuccessHandler(function(res){
      if (!res || !res.ok) { showErr(res && res.error || 'Error'); document.getElementById('btnSend').textContent = 'Enviar factura'; setSend(true); return; }
      document.getElementById('form').innerHTML =
        '<div class="ok-msg">✅ Factura <b>'+esc(res.numeroFmt)+'</b> enviada a <b>'+esc(res.email)+'</b>.<br>'+
        'Guardada en la carpeta <b>'+esc(res.carpeta)+'</b>.<br>'+
        '<a href="'+res.pdfUrl+'" target="_blank">Ver PDF</a></div>'+
        '<div class="actions"><button class="cancel" onclick="google.script.host.close()">Cerrar</button></div>';
    }).withFailureHandler(function(e){ showErr(e); document.getElementById('btnSend').textContent = 'Enviar factura'; setSend(true); }).facEnviar(Number(CURRENT.row));
  }

  function setSend(on){ document.getElementById('btnSend').disabled = !on; }
  function showErr(e){ document.getElementById('preview').innerHTML = '<div class="preview err">'+esc(String(e && e.message || e))+'</div>'; }
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
